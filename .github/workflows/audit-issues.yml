name: Audit issues

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Run issue audit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/workflows/scripts/audit_issues.py csxark/cryptoviz issues-audit.txt

      - name: Commit audit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add issues-audit.txt
          git commit -m "chore: append new issues to audit log" || exit 0
          git push